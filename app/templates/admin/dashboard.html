{% extends 'base.html' %}{% block content %}<h1>Admin</h1><div class="row g-3">
{% for label,value in [('Users',users),('Roles',roles),('Workflows',workflows)] %}<div class="col-md-4"><div class="card"><div class="card-body"><div class="display-6">{{ value }}</div><div>{{ label }}</div></div></div></div>{% endfor %}</div>
<div class="mt-3"><a class="btn btn-outline-primary" href="{{ url_for('admin.users') }}">Users</a> <a class="btn btn-outline-primary" href="{{ url_for('admin.roles') }}">Roles</a> <a class="btn btn-outline-primary" href="{{ url_for('admin.settings') }}">Setup</a></div>{% endblock %}
