{% extends 'base.html' %}{% block content %}<div class="d-flex justify-content-between"><h1>Users</h1><a class="btn btn-primary" href="{{ url_for('admin.user_new') }}">New user</a></div><table class="table"><tr><th>Email</th><th>Name</th><th>Roles</th><th>Active</th><th></th></tr>{% for user in users %}<tr><td>{{ user.email }}</td><td>{{ user.name }}</td><td>{{ user.roles|map(attribute='name')|join(', ') }}</td><td>{{ user.active }}</td><td><a href="{{ url_for('admin.user_edit', user_id=user.id) }}">Edit</a><form method="post" action="{{ url_for('admin.user_delete', user_id=user.id) }}" class="d-inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-link text-danger">Delete</button></form></td></tr>{% endfor %}</table>{% endblock %}
