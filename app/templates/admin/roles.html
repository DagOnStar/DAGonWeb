{% extends 'base.html' %}{% block content %}<div class="d-flex justify-content-between"><h1>Roles</h1><a class="btn btn-primary" href="{{ url_for('admin.role_new') }}">New role</a></div><table class="table"><tr><th>Name</th><th>Description</th><th></th></tr>{% for role in roles %}<tr><td>{{ role.name }}</td><td>{{ role.description }}</td><td><a href="{{ url_for('admin.role_edit', role_id=role.id) }}">Edit</a><form method="post" action="{{ url_for('admin.role_delete', role_id=role.id) }}" class="d-inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-link text-danger">Delete</button></form></td></tr>{% endfor %}</table>{% endblock %}
