{% extends 'base.html' %}{% block content %}<div class="d-flex justify-content-between align-items-center"><h1>Workflows</h1><a class="btn btn-primary" href="{{ url_for('workflows.create_workflow') }}">New workflow</a></div><div class="row g-3">{% for wf in workflows %}<div class="col-md-4"><div class="card h-100"><div class="card-body"><h2 class="h5">{{ wf.name }}</h2><p>{{ wf.description }}</p><p class="text-muted">Owner: {{ wf.owner.name }}{% if wf.is_public %} · public{% endif %}</p><a class="btn btn-sm btn-primary" href="{{ url_for('workflows.editor', workflow_id=wf.id) }}">Open editor</a><a class="btn btn-sm btn-outline-secondary" href="{{ url_for('workflows.edit_workflow', workflow_id=wf.id) }}">Metadata</a><form class="d-inline" method="post" action="{{ url_for('workflows.run_workflow', workflow_id=wf.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-success">Run</button></form></div></div></div>{% else %}<p>No workflows yet.</p>{% endfor %}</div>{% endblock %}
