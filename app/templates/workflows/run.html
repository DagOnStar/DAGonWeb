{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><div><h1 class="h3 mb-0">Run {{ run.id }}</h1><span id="runStatus" class="badge text-bg-secondary">{{ run.status }}</span></div><a class="btn btn-outline-secondary" href="{{ url_for('workflows.editor', workflow_id=workflow.id) }}">Back to canvas</a></div>
<div class="row g-3"><div class="col-lg-8"><div id="runWorkspace" class="run-workspace"><svg id="runLinks"></svg></div></div><div class="col-lg-4"><div class="card h-100"><div class="card-header">Task details</div><div id="runInspector" class="card-body"><p class="text-muted">Select a completed task to inspect its scratch files.</p></div></div></div></div>
{% endblock %}
{% block scripts %}
<script>
const graph={{ workflow.as_json()|tojson }};const workspace=document.getElementById('runWorkspace'),svg=document.getElementById('runLinks'),inspector=document.getElementById('runInspector'),statusBadge=document.getElementById('runStatus');let runTasks={};
const curve=(a,b)=>{const bend=Math.max(60,Math.abs(b.x-a.x)/2);return `M ${a.x+150} ${a.y+35} C ${a.x+150+bend} ${a.y+35}, ${b.x-bend} ${b.y+35}, ${b.x} ${b.y+35}`};
function draw(){workspace.querySelectorAll('.run-node').forEach(n=>n.remove());const tasks=Object.values(graph.tasks);svg.innerHTML='<defs><marker id="runArrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10z"/></marker></defs>';tasks.forEach(a=>(a.nexts||[]).forEach(name=>{const b=graph.tasks[name];if(!b)return;const path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('class','run-link');path.setAttribute('d',curve(a.dagonweb||{},b.dagonweb||{}));svg.appendChild(path)}));tasks.forEach(task=>{const pos=task.dagonweb||{},state=runTasks[task.name];const node=document.createElement('button');node.className=`run-node ${state?.status||'pending'}`;node.style.left=`${pos.x||100}px`;node.style.top=`${pos.y||100}px`;node.textContent=`${task.name} · ${state?.status||'pending'}`;node.disabled=!state||!['success','failed'].includes(state.status);node.onclick=()=>inspect(state);workspace.appendChild(node)})}
async function inspect(task){let path='';const filesUrl=p=>`{{ url_for('workflows.browse_task_run_files', task_run_id=0) }}`.replace('/0/',`/${task.id}/`)+(p?`?path=${encodeURIComponent(p)}`:'');const fileUrl=(endpoint,p)=>`{{ url_for('workflows.preview_task_run_file', task_run_id=0) }}`.replace('/0/',`/${task.id}/`).replace('/file','/'+endpoint)+(p?`?path=${encodeURIComponent(p)}`:'');const show=async p=>{const response=await fetch(filesUrl(p));if(!response.ok){inspector.innerHTML='<p class="text-danger">Scratch files are unavailable.</p>';return}const data=await response.json();path=p;inspector.innerHTML=`<h2 class="h6">${task.name} · ${task.status}</h2><div class="btn-group btn-group-sm mb-2"><button id="upScratch" class="btn btn-outline-secondary" ${p?'':'disabled'}>Up</button><a class="btn btn-outline-secondary" href="{{ url_for('workflows.download_task_run_archive', task_run_id=0) }}".replace('/0/', '/${task.id}/')>Download ZIP</a></div><p class="small mono">/${p}</p><div class="list-group mb-2">${data.files.map(file=>`<button class="list-group-item list-group-item-action" data-name="${file.name}" data-dir="${file.is_dir}">${file.is_dir?'📁':'📄'} ${file.name}</button>`).join('')||'<div class="list-group-item text-muted">No files.</div>'}</div><pre id="filePreview" class="bg-dark text-light p-2 mono small">Select a text file to preview it.</pre>`;document.getElementById('upScratch').onclick=()=>show(p.split('/').slice(0,-1).join('/'));inspector.querySelectorAll('[data-name]').forEach(button=>button.onclick=async()=>{const next=p?`${p}/${button.dataset.name}`:button.dataset.name;if(button.dataset.dir==='true')return show(next);const preview=await fetch(fileUrl('file',next));const result=await preview.json();document.getElementById('filePreview').textContent=preview.ok?result.content:(result.error||'Unable to preview file.');const download=document.createElement('a');download.className='btn btn-sm btn-outline-primary mt-2';download.textContent='Download file';download.href=fileUrl('download',next);document.getElementById('filePreview').after(download)})};show('')}
async function poll(){const response=await fetch('{{ url_for('workflows.run_status', workflow_id=workflow.id, run_id=run.id) }}');if(!response.ok)return;const data=await response.json();statusBadge.textContent=data.status;statusBadge.className=`badge ${data.status==='success'?'text-bg-success':data.status==='failed'?'text-bg-danger':'text-bg-primary'}`;runTasks=Object.fromEntries(data.tasks.map(task=>[task.name,task]));draw();if(['pending','running'].includes(data.status))setTimeout(poll,1000)}draw();poll();
</script>
{% endblock %}
