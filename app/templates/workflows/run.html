{% extends 'base.html' %}{% block content %}<h1>Run {{ run.id }} · {{ run.status }}</h1><p><strong>Scratch:</strong> <code>{{ run.scratch_path }}</code></p><pre class="bg-light p-3">{{ run.log }}</pre><h2 class="h4">Tasks</h2><div class="accordion" id="tasks">{% for tr in run.task_runs %}<div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#t{{ tr.id }}">{{ tr.task_uid }} · {{ tr.status }}</button></h2><div id="t{{ tr.id }}" class="accordion-collapse collapse" data-bs-parent="#tasks"><div class="accordion-body"><p><code>{{ tr.scratch_path }}</code></p><pre>{{ tr.log }}</pre><button class="btn btn-sm btn-outline-primary file-list" data-path="{{ tr.scratch_path }}">Inspect files</button><ul class="mt-2"></ul></div></div></div>{% endfor %}</div>{% endblock %}{% block scripts %}<script>document.querySelectorAll('.file-list').forEach(btn=>btn.addEventListener('click',async()=>{const r=await fetch('{{ url_for('workflows.files') }}?path='+encodeURIComponent(btn.dataset.path));const data=await r.json();btn.nextElementSibling.innerHTML=data.map(f=>`<li>${f.is_dir?'📁':'📄'} ${f.name} (${f.size} bytes)</li>`).join('')}));</script>{% endblock %}
